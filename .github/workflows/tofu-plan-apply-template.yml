name: OpenTofu Plan & Apply

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Directory containing OpenTofu configuration'
        required: false
        type: string
        default: 'tofu'
      backend_resource_group:
        description: 'Resource group containing the state storage account'
        required: false
        type: string
        default: 'infra'
      backend_storage_account:
        description: 'Name of the Azure Storage Account for state'
        required: true
        type: string
      backend_container:
        description: 'Blob container name for state files'
        required: false
        type: string
        default: 'tfstate'
      backend_key:
        description: 'State file key (e.g., my-app.tfstate)'
        required: true
        type: string
      infra_bootstrap_repo:
        description: 'GitHub repo containing shared provider definitions'
        required: false
        type: string
        default: 'nelsong6/infra-bootstrap'
      infra_bootstrap_ref:
        description: 'Branch or tag of infra-bootstrap to pull providers from'
        required: false
        type: string
        default: 'main'
      tofu_vars:
        description: 'Extra -var flags as a string (e.g., -var="foo=bar" -var="baz=qux")'
        required: false
        type: string
        default: ''
      tofu_version:
        description: 'OpenTofu version to install'
        required: false
        type: string
        default: '1.9.0'
      destroy:
        description: 'Generate a destroy plan instead of a regular plan. Pair with workflow_dispatch on the caller side to keep push-to-main paths non-destructive.'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ inputs.tofu_version }}

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Download shared providers
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Downloading shared provider definitions from ${{ inputs.infra_bootstrap_repo }}@${{ inputs.infra_bootstrap_ref }}..."
          curl -fsSL -o shared-providers.tf \
            "https://raw.githubusercontent.com/${{ inputs.infra_bootstrap_repo }}/${{ inputs.infra_bootstrap_ref }}/tofu/provider/shared-providers.tf"
          curl -fsSL -o .terraform.lock.hcl \
            "https://raw.githubusercontent.com/${{ inputs.infra_bootstrap_repo }}/${{ inputs.infra_bootstrap_ref }}/tofu/provider/.terraform.lock.hcl"

      - name: Configure OpenTofu provider cache
        run: |
          mkdir -p "$HOME/.terraform.d/plugin-cache"
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> "$GITHUB_ENV"

      - name: Cache OpenTofu providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: opentofu-providers-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_directory)) }}
          restore-keys: |
            opentofu-providers-${{ runner.os }}-

      - name: Initialize OpenTofu
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}"

      - name: Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          set -o pipefail
          DESTROY_FLAG=""
          if [ "${{ inputs.destroy }}" = "true" ]; then
            DESTROY_FLAG="-destroy"
            echo "::warning::Generating DESTROY plan — apply will tear down everything currently in state."
          fi
          tofu plan $DESTROY_FLAG -out=tfplan ${{ inputs.tofu_vars }} 2>&1 | tee plan_output.txt

          # Check plan for actual changes using tofu show
          PLAN_JSON=$(tofu show -json tfplan)
          RESOURCE_CHANGES=$(echo "$PLAN_JSON" | jq '[.resource_changes[]? | select((.change.actions | . != ["no-op"]) or .change.importing)] | length')

          MODE_LABEL="Infrastructure changes"
          if [ "${{ inputs.destroy }}" = "true" ]; then
            MODE_LABEL="DESTROY plan — resources to remove"
          fi

          echo "Resource changes detected: $RESOURCE_CHANGES"
          if [ "$RESOURCE_CHANGES" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### $MODE_LABEL detected ($RESOURCE_CHANGES resources)" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "### No infrastructure changes detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8');

            // Truncate if too long for a GitHub comment
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (truncated)'
              : planOutput;

            const body = `### OpenTofu Plan
            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`
            </details>`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### OpenTofu Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

  apply:
    name: Apply
    needs: plan
    if: github.event_name != 'pull_request' && needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ inputs.tofu_version }}

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Download shared providers
        working-directory: ${{ inputs.working_directory }}
        run: |
          curl -fsSL -o shared-providers.tf \
            "https://raw.githubusercontent.com/${{ inputs.infra_bootstrap_repo }}/${{ inputs.infra_bootstrap_ref }}/tofu/provider/shared-providers.tf"
          curl -fsSL -o .terraform.lock.hcl \
            "https://raw.githubusercontent.com/${{ inputs.infra_bootstrap_repo }}/${{ inputs.infra_bootstrap_ref }}/tofu/provider/.terraform.lock.hcl"

      - name: Configure OpenTofu provider cache
        run: |
          mkdir -p "$HOME/.terraform.d/plugin-cache"
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> "$GITHUB_ENV"

      - name: Cache OpenTofu providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: opentofu-providers-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_directory)) }}
          restore-keys: |
            opentofu-providers-${{ runner.os }}-

      - name: Initialize OpenTofu
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}

      - name: Apply
        working-directory: ${{ inputs.working_directory }}
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          tofu apply tfplan
          echo "### Apply successful" >> $GITHUB_STEP_SUMMARY
