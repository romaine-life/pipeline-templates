name: Go Dependency Update Template

# Called by consumer repos on repository_dispatch when an upstream publishes.
# Bumps the specified modules in go.mod, commits+pushes, then delegates to
# release-and-dispatch-template.yml to cut the release and notify downstream.
#
# Split into two jobs so the release path is a reusable workflow
# (release-and-dispatch-template.yml) shared with each consumer's release.yml
# (which fires on direct pushes to main). Keeps the dep-update and
# direct-release paths using the exact same release logic — no drift.
#
# Race protection:
#   - `ref: github.ref_name` on checkout → runtime sha resolution, not stale
#     sha from dispatch scheduling (prior 2026-04-16 fzt-frontend v0.1.1
#     incident was a stale-sha bug).
#   - `uses:` call to release template (not workflow_dispatch) → no second
#     scheduling window.
#   - Release template's "skip if HEAD already released" guard protects
#     against duplicate tags when dep-update lands on top of a direct push
#     that the consumer's release.yml already released.

on:
  workflow_call:
    inputs:
      go-mod-path:
        description: 'Path to the directory containing go.mod (relative to repo root)'
        required: false
        type: string
        default: '.'
      modules:
        description: 'Space-separated list of Go module paths to update'
        required: true
        type: string
      dispatch-repos:
        description: 'Comma-separated list of consumer repo names to notify after releasing'
        required: false
        type: string
        default: ''
      dispatch-event:
        description: 'event_type for downstream repository_dispatch'
        required: false
        type: string
        default: 'fzt-updated'
      version-prefix:
        description: 'Tag prefix for auto-incrementing patch (e.g. v0.1 -> v0.1.0)'
        required: false
        type: string
        default: 'v0.1'
      artifact-build-workflow:
        description: 'Optional workflow file in the caller repo to trigger after release'
        required: false
        type: string
        default: ''
    outputs:
      changed:
        description: 'Whether go.mod was updated'
        value: ${{ jobs.update.outputs.changed }}
      new-tag:
        description: 'The tag cut by this run (only set when a release was created)'
        value: ${{ jobs.release.outputs.new-tag }}

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.go-mod-path }}/go.mod

      - name: Update dependencies
        working-directory: ${{ inputs.go-mod-path }}
        env:
          GOPROXY: direct
          GONOSUMCHECK: github.com/nelsong6/*
        run: |
          for mod in ${{ inputs.modules }}; do
            echo "Updating $mod..."
            go get "${mod}@latest"
          done
          go mod tidy

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet ${{ inputs.go-mod-path }}/go.mod ${{ inputs.go-mod-path }}/go.sum; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Already on latest"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff ${{ inputs.go-mod-path }}/go.mod
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.go-mod-path }}/go.mod ${{ inputs.go-mod-path }}/go.sum
          git commit -m "deps: update $(echo '${{ inputs.modules }}' | sed 's|github.com/nelsong6/||g' | tr ' ' ', ')"
          git push

  # Delegate the release-cut + downstream dispatch to the shared reusable
  # workflow. The exact same template is called directly by each consumer's
  # release.yml on push-to-main, so the two paths stay in lockstep.
  release:
    needs: update
    if: needs.update.outputs.changed == 'true'
    # Can't use local ./.github/... ref from a reusable workflow — must be
    # fully-qualified. Pinned to @main so the release logic stays in lockstep
    # with what consumer release.yml files call.
    uses: nelsong6/pipeline-templates/.github/workflows/release-and-dispatch-template.yml@main
    with:
      dispatch-repos: ${{ inputs.dispatch-repos }}
      dispatch-event: ${{ inputs.dispatch-event }}
      version-prefix: ${{ inputs.version-prefix }}
      artifact-build-workflow: ${{ inputs.artifact-build-workflow }}
