name: Shared Repository Linting

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Directory to check'
        required: false
        type: string
        default: '.'

permissions:
  contents: read

jobs:
  # ============================================================================
  # 📝 Newline Check
  # ============================================================================
  check-newlines:
    name: Trailing Newlines
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check for trailing newlines
        run: |
          FAILED=0
          for file in $(git grep -Il ''); do
            if [ -s "$file" ] && [ "$(tail -c 1 "$file" | wc -l)" -eq 0 ]; then
              echo "❌ Missing trailing newline: $file"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "Some files are missing a trailing newline. Please add an empty line to the end of the files listed above."
            exit 1
          fi

  # ============================================================================
  # 🛑 YAML Extension Check
  # ============================================================================
  # Standardize on .yaml — Helm requires Chart.yaml/values.yaml exactly, the
  # Kubernetes ecosystem (kubectl, ArgoCD, Kustomize) emits .yaml by default,
  # and yaml.org's preferred extension is .yaml. .yml is flagged.
  check-yaml:
    name: YAML Extensions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Enforce .yaml extension
        run: |
          YAML_FILES=$(git ls-files '*.yml')
          if [ -n "$YAML_FILES" ]; then
            echo "❌ Found files with the '.yml' extension. Please rename them to use '.yaml' instead:"
            echo "$YAML_FILES"
            exit 1
          fi

  # ============================================================================
  # 🔤 Filename Check (No Underscores)
  # ============================================================================
  check-underscores:
    name: Filename Underscores
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Enforce no underscores in filenames
        run: |
          IGNORE_LIST=$(cat << 'EOF'
          PULL_REQUEST_TEMPLATE
          ISSUE_TEMPLATE
          EOF
          )

          IGNORE_PATTERN=$(echo "$IGNORE_LIST" | grep -v '^$' | paste -sd '|' -)
          UNDERSCORE_FILES=$(git ls-files '*_*')

          if [ -z "$UNDERSCORE_FILES" ]; then
            exit 0
          fi

          if [ -n "$IGNORE_PATTERN" ]; then
            FAILED_FILES=$(echo "$UNDERSCORE_FILES" | grep -vE "$IGNORE_PATTERN" || true)
          else
            FAILED_FILES="$UNDERSCORE_FILES"
          fi

          # Extensions exempt from the no-underscores rule:
          # .md, .js     — pre-existing exemptions
          # .py          — Python module names *require* underscores (`my_module`)
          # image/asset  — original filenames frequently contain underscores
          #                and renaming risks breaking absolute path references
          FAILED_FILES=$(echo "$FAILED_FILES" | grep -vE '\.(md|js|py|webp|png|jpe?g|gif|svg|ico|txt)$' || true)

          if [ -n "$(echo "$FAILED_FILES" | grep -v '^$')" ]; then
            echo "❌ Found files with underscores in their names. Please rename them to use hyphens (-) instead:"
            echo "$FAILED_FILES"
            exit 1
          fi

  # ============================================================================
  # 🏗️ OpenTofu Format
  # ============================================================================
  check-tofu:
    name: OpenTofu Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 'latest'
      - name: Run tofu fmt check
        run: |
          if tofu fmt -recursive -check; then
            echo "✅ All OpenTofu files are properly formatted"
          else
            echo "❌ Format check failed. Please run 'tofu fmt -recursive' locally."
            tofu fmt -recursive -check -diff || true
            exit 1
          fi
